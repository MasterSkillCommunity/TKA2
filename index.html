<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akash Bhai · Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- Meta Pixel (unchanged) -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1399759825142874');
    fbq('track', 'PageView');
    </script>

    <style>
        /* subtle overlay to keep text readable over background */
        .bg-overlay {
            background: rgba(0, 0, 0, 0.2); /* darken bg image slightly */
        }
        .dark .bg-overlay {
            background: rgba(0, 0, 0, 0.5); /* deeper in dark mode */
        }
        /* card background with blur for glassmorphic effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300 relative" 
      style="background-image: url('https://images.unsplash.com/photo-1622279457486-28f319ae9f0b?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; background-repeat: no-repeat;">

    <!-- semi-transparent overlay (improves readability) -->
    <div class="absolute inset-0 bg-overlay"></div>

    <!-- main content card: centered, elevated, glass effect, max-w-[420px] (slightly wider) -->
    <div class="relative z-10 w-full max-w-[420px] glass-card rounded-3xl shadow-2xl p-8 text-center transition-all duration-300">

        <!-- profile picture with extra margin-top to avoid clipping (no absolute shift) -->
        <div class="mx-auto w-28 h-28 mb-5 relative">
            <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-30 animate-pulse"></div>
            <img src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69ae98fe07edc_photo_2026-03-09_15-25-02.jpg" 
                 class="relative w-full h-full rounded-full object-cover border-4 border-white dark:border-[#2c2c2e] shadow-xl"
                 alt="Akash Bhai profile">
            <div class="absolute bottom-2 right-1 bg-white dark:bg-black rounded-full p-1 shadow">
                <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
        </div>

        <!-- name -->
        <h1 class="text-3xl font-black mb-2 tracking-tight leading-none text-gray-900 dark:text-white">
            Akash Bhai
        </h1>
        <p class="text-gray-600 dark:text-gray-300 font-medium mb-7">
            Join now for exclusive insights and daily tips.
        </p>

        <!-- button redirects to /join-telegram -->
        <a href="/join-telegram" id="joinBtn" 
           class="block w-full bg-[#0088cc] hover:bg-[#007ab8] text-white font-bold text-lg py-5 rounded-2xl shadow-xl shadow-blue-500/30 transition-all transform hover:scale-[1.02] active:scale-95 relative overflow-hidden">
            <span id="btnText">JOIN CHANNEL</span>
            <span id="btnLoad" class="hidden absolute inset-0 flex items-center justify-center bg-[#007ab8]">
                <svg class="animate-spin h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </span>
        </a>

        <!-- footer badges -->
        <div class="mt-8 flex justify-center gap-6 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
            <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> Encrypted</span>
            <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Verified</span>
        </div>

    </div> <!-- end glass card -->

    <script>
        document.getElementById('joinBtn').addEventListener('click', function(e) {
            e.preventDefault();
            var url = this.href;  // "/join-telegram"
            
            document.getElementById('btnText').classList.add('opacity-0');
            document.getElementById('btnLoad').classList.remove('hidden');
            
            if (typeof fbq === 'function') { fbq('track', 'InitiateCheckout'); }
            
            setTimeout(function() { window.location.href = url; }, 200);
        });
    </script>

    <!-- Note: Background image from Unsplash (tennis court) – free to use. 
         If you prefer a solid dark/light fallback, it's already handled by overlay -->
</body>
</html>
